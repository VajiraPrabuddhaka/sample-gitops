apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sample-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/vajiraprabuddhaka/sample-gitops
    targetRevision: main
    path: argo/apps
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true