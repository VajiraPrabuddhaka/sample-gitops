apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-shared
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/vajiraprabuddhaka/sample-gitops
    targetRevision: main
    path: platform-shared
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
