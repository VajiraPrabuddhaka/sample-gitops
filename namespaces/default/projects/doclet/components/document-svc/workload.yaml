apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: document-svc-workload
  namespace: default
spec:
  container:
    env:
    - key: DOCLET_DOCUMENT_ADDR
      value: :8080
    - key: DOCLET_DATABASE_URL
      value: postgres://doclet:doclet@postgres:5432/doclet?sslmode=disable
    - key: DOCLET_NATS_URL
      value: nats://nats:4222
    image: host.k3d.internal:10082/doclet-document-svc-image:v1-4a2acc61
  owner:
    componentName: document-svc
    projectName: doclet
